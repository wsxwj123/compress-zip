name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装 rar 解压后端
        run: brew install unar
      - name: 安装 Python 依赖
        run: python -m pip install -r requirements.txt pytest
      - name: 跑测试
        run: python -m pytest tests/ -q
